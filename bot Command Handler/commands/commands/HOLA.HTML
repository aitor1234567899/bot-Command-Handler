<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Embed Builder Master Pro</title>
    <style>
        :root {
            --bg-dark: #202225; --bg-main: #36393f; --bg-editor: #2f3136;
            --text-main: #dcddde; --text-muted: #72767d; --discord-blurple: #5865f2;
            --discord-green: #3ba55c; --discord-red: #ed4245; --discord-link: #00aff4;
        }

        body { font-family: 'Whitney', sans-serif; background-color: var(--bg-main); color: var(--text-main); margin: 0; padding: 20px; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .main-container { display: flex; gap: 20px; flex: 1; overflow: hidden; }
        
        .editor-panel { flex: 1.2; background-color: var(--bg-editor); padding: 20px; border-radius: 8px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .section-title { font-size: 11px; font-weight: bold; color: var(--text-muted); text-transform: uppercase; border-bottom: 1px solid #4f545c; padding-bottom: 4px; margin-top: 10px; }
        input, textarea { padding: 10px; background: var(--bg-dark); border: 1px solid #1e1e1e; border-radius: 4px; color: white; font-size: 14px; }
        
        .toolbar { display: flex; gap: 4px; background: #202225; padding: 8px; border-radius: 4px 4px 0 0; border: 1px solid #1e1e1e; margin-bottom: -6px; }
        .btn-tool { color: white; border: none; padding: 6px 12px; border-radius: 3px; cursor: pointer; font-weight: bold; font-size: 12px; }
        .btn-format { background: #4f545c; }
        .btn-h1 { background: #72767d; color: white; } /* Botón para el título grande */
        .btn-link { background: var(--discord-green); }
        .btn-clear { background: var(--discord-red); margin-left: auto; }

        .preview-panel { flex: 1; display: flex; flex-direction: column; gap: 10px; }
        .discord-embed { background: var(--bg-dark); border-radius: 4px; padding: 16px; border-left: 4px solid #5865f2; position: relative; }
        .embed-author { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .embed-author img { width: 24px; height: 24px; border-radius: 50%; }
        .embed-title { font-size: 16px; font-weight: 600; color: var(--discord-link); text-decoration: none; display: block; margin-bottom: 5px; }
        .embed-description { font-size: 14px; white-space: pre-wrap; color: #dcddde; }
        
        /* Estilo para simular el # de Discord en la web */
        .embed-description h1 { font-size: 1.2rem; margin: 8px 0; color: white; border-bottom: none; }
        .embed-description b { color: white; }
        .embed-description a { color: var(--discord-link); text-decoration: none; }

        .embed-thumbnail { width: 80px; height: 80px; border-radius: 4px; position: absolute; top: 16px; right: 16px; }
        .embed-image { max-width: 100%; border-radius: 4px; margin-top: 10px; }
        .embed-footer { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-muted); margin-top: 10px; }
        .embed-footer img { width: 20px; height: 20px; border-radius: 50%; }

        .json-box { background: black; color: #0f0; padding: 15px; font-family: monospace; font-size: 12px; border-radius: 4px; flex: 1; overflow-y: auto; }
        .copy-btn { width: 100%; padding: 15px; background: var(--discord-blurple); color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        
        #toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
            background: var(--discord-green); color: white; padding: 12px 25px; border-radius: 50px;
            font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.5); transition: 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); opacity: 0; pointer-events: none;
        }
        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="editor-panel">
            <div class="section-title">Autor y Título</div>
            <input type="text" id="author_name" placeholder="Nombre del Autor" oninput="updatePreview()">
            <input type="text" id="author_icon" placeholder="URL Icono del Autor" oninput="updatePreview()">
            <input type="text" id="title" placeholder="Título" oninput="updatePreview()">
            <input type="text" id="url" placeholder="URL del Título (Link)" oninput="updatePreview()">

            <div class="section-title">Cuerpo</div>
            <div class="toolbar">
                <button class="btn-tool btn-h1" onclick="applyFormat('# ', true)">H1 (Grande)</button>
                <button class="btn-tool btn-format" onclick="applyFormat('**')">B</button>
                <button class="btn-tool btn-format" onclick="applyFormat('*')">I</button>
                <button class="btn-tool btn-link" onclick="applyLinkFormat()">Link [ ]( )</button>
                <button class="btn-tool btn-clear" onclick="clearEditor()">Limpiar 🗑️</button>
            </div>
            <textarea id="description" rows="5" placeholder="Escribe aquí..." oninput="updatePreview()"></textarea>

            <div class="section-title">Multimedia</div>
            <input type="color" id="color" value="#5865f2" oninput="updatePreview()" style="width:100%; height:35px; border:none; padding:0; cursor:pointer;">
            <input type="text" id="thumb_url" placeholder="URL Miniatura (Arriba derecha)" oninput="updatePreview()">
            <input type="text" id="image_url" placeholder="URL Imagen Grande (Abajo)" oninput="updatePreview()">

            <div class="section-title">Pie de Página</div>
            <input type="text" id="footer_text" placeholder="Texto del footer" oninput="updatePreview()">
            <input type="text" id="footer_icon" placeholder="URL Icono del footer" oninput="updatePreview()">
        </div>

        <div class="preview-panel">
            <div class="discord-embed" id="embed-box">
                <img src="" id="p-thumb" class="embed-thumbnail" style="display:none;">
                <div class="embed-author" id="p-auth-box" style="display:none;">
                    <img src="" id="p-auth-icon" style="display:none;">
                    <span id="p-auth-name"></span>
                </div>
                <a href="#" id="p-title" class="embed-title" target="_blank"></a>
                <div class="embed-description" id="p-desc"></div>
                <img src="" id="p-main-img" class="embed-image" style="display:none;">
                <div class="embed-footer" id="p-foot-box" style="display:none;">
                    <img src="" id="p-foot-icon" style="display:none;">
                    <span id="p-foot-text"></span>
                </div>
            </div>
            <div class="json-box" id="json-code"></div>
            <button class="copy-btn" onclick="copyCode()">📋 COPIAR JSON</button>
        </div>
    </div>

    <div id="toast">✅ ¡Código copiado al portapapeles!</div>

    <script>
        // Función mejorada para soportar prefijos (como el #)
        function applyFormat(sym, isPrefix = false) {
            const area = document.getElementById('description');
            const start = area.selectionStart;
            const end = area.selectionEnd;
            
            if(isPrefix) {
                // Inserta el símbolo al inicio de la selección
                area.value = area.value.substring(0, start) + sym + area.value.substring(start);
            } else {
                // Envuve la selección (negrita, cursiva)
                area.value = area.value.substring(0, start) + sym + area.value.substring(start, end) + sym + area.value.substring(end);
            }
            
            updatePreview();
            area.focus();
        }

        function applyLinkFormat() {
            const area = document.getElementById('description');
            area.value += "[Texto](URL)";
            updatePreview();
            area.focus();
        }

        function clearEditor() {
            if(confirm("¿Borrar todo el trabajo?")) {
                document.querySelectorAll('input:not([type="color"])').forEach(i => i.value = "");
                document.getElementById('description').value = "";
                updatePreview();
            }
        }

        function parseMarkdown(text) {
            if(!text) return "";
            return text
                // Títulos grandes (# Texto)
                .replace(/^# (.*?)$/gm, '<h1>$1</h1>')
                // Negritas (**Texto**)
                .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
                // Cursivas (*Texto*)
                .replace(/\*(.*?)\*/g, '<i>$1</i>')
                // Links ([Texto](URL))
                .replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank">$1</a>');
        }

        function updatePreview() {
            const get = (id) => document.getElementById(id).value;
            const setImg = (id, url) => {
                const el = document.getElementById(id);
                if(url) { el.src = url; el.style.display = 'block'; } else { el.style.display = 'none'; }
            };

            document.getElementById('p-title').innerText = get('title');
            document.getElementById('p-title').href = get('url') || "#";
            document.getElementById('p-title').style.display = get('title') ? 'block' : 'none';
            document.getElementById('p-desc').innerHTML = parseMarkdown(get('description')) || "Escribiendo...";
            document.getElementById('embed-box').style.borderLeftColor = get('color');

            document.getElementById('p-auth-box').style.display = get('author_name') ? 'flex' : 'none';
            document.getElementById('p-auth-name').innerText = get('author_name');
            setImg('p-auth-icon', get('author_icon'));
            setImg('p-thumb', get('thumb_url'));
            setImg('p-main-img', get('image_url'));

            document.getElementById('p-foot-box').style.display = get('footer_text') ? 'flex' : 'none';
            document.getElementById('p-foot-text').innerText = get('footer_text');
            setImg('p-foot-icon', get('footer_icon'));

            const json = {
                title: get('title') || null,
                description: get('description') || null,
                color: parseInt(get('color').replace('#', ''), 16),
                author: get('author_name') ? { name: get('author_name'), icon_url: get('author_icon') } : null,
                image: get('image_url') ? { url: get('image_url') } : null,
                thumbnail: get('thumb_url') ? { url: get('thumb_url') } : null,
                footer: get('footer_text') ? { text: get('footer_text'), icon_url: get('footer_icon') } : null
            };
            document.getElementById('json-code').innerText = JSON.stringify(json, null, 2);
        }

        function copyCode() {
            const code = document.getElementById('json-code').innerText;
            navigator.clipboard.writeText(code);
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 2500);
        }

        updatePreview();
    </script>
</body>
</html>
